<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRS Digital Signage</title>
    <meta name="description" content="Cowley Road Studios — Recording · Rehearsal · Workshop Café · Oxford" />
    <meta name="robots" content="noindex" />

    <!-- Amber terminal dot favicon -->
    <link rel="icon" type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='12' fill='%23d4af37'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%23f2b21c'/%3E%3C/svg%3E"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">

      <!-- ══ TOP BAR — CR|S lightbox sign ══════════════════ -->
      <header class="topbar">

        <!-- LEFT: illuminated CR|S badge — mirrors the physical lightbox sign -->
        <div class="brand-lockup">
          <!-- ivory panel: CR with green underline -->
          <div class="brand-cr">
            <span class="brand-cr-text">CR</span>
          </div>
          <div class="brand-divider"></div>
          <!-- gold panel: S -->
          <div class="brand-s">
            <span class="brand-s-text">S</span>
          </div>
        </div>

        <!-- CENTRE: studio name + live status -->
        <div class="status-strip">
          <span class="status-accent"></span>
          <span class="status-name">COWLEY ROAD STUDIOS</span>
          <span class="signal-dot" aria-hidden="true"></span>
          <span id="system-status">LIVE</span>
          <span class="status-accent" style="transform:scaleX(-1)"></span>
        </div>

        <!-- RIGHT: slide counter -->
        <div class="topbar-right">
          <span id="slide-counter"></span>
          <span class="rack-screw" aria-hidden="true"></span>
        </div>

      </header>

      <!-- ══ STAGE ═══════════════════════════════════════════ -->
      <main class="stage" id="stage" aria-live="polite" aria-atomic="true"></main>

      <!-- ══ BOTTOM BAR — café fascia ticker ════════════════ -->
      <div class="bottom-bar">
        <nav class="controls" aria-label="Slide controls">
          <span class="rack-screw" aria-hidden="true"></span>
          <button class="control-btn" id="prev-btn" type="button" aria-label="Previous slide">&#8592;</button>
          <div id="dots" class="dots" role="tablist" aria-label="Slides"></div>
          <button class="control-btn" id="next-btn" type="button" aria-label="Next slide">&#8594;</button>
          <span class="rack-screw" aria-hidden="true"></span>
        </nav>
        <div class="ticker-wrap" aria-label="Services ticker">
          <div class="ticker-track" id="ticker-track"></div>
        </div>
      </div>

    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
