<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRS Digital Signage</title>
    <meta name="description" content="Cowley Road Studios — Recording · Rehearsal · Workshop Café · Oxford" />
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">

      <header class="topbar">
        <div class="brand-lockup" aria-label="Cowley Road Studios">
          <div class="brand-mark"><span>CRS</span></div>
          <span class="brand-name">Cowley Road Studios</span>
        </div>

        <div class="status-strip">
          <span class="signal-dot" aria-hidden="true"></span>
          <span id="system-status">Live</span>
        </div>

        <span id="slide-counter" class="slide-counter"></span>
      </header>

      <main class="stage" id="stage" aria-live="polite" aria-atomic="true"></main>

      <div class="bottom-bar">
        <nav class="controls" aria-label="Slide controls">
          <button class="control-btn" id="prev-btn" type="button" aria-label="Previous slide">&#8592;</button>
          <div id="dots" class="dots" role="tablist" aria-label="Slides"></div>
          <button class="control-btn" id="next-btn" type="button" aria-label="Next slide">&#8594;</button>
        </nav>

        <footer class="ticker-wrap" aria-label="Services ticker">
          <div class="ticker-track" id="ticker-track"></div>
        </footer>
      </div>

    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
